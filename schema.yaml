r2:
  bucket: cs611-project

backfill:
  start_date: "1983-01-01"
  end_date: "2024-12-31"

landing:
  path: "s3a://cs611-project/landing"
  legal_docs:
    folder: "legal_docs"
    file_prefix: "EurLex_snapshot_"
    tables:
      legal_docs_raw:
        partition_col: snapshot_date
  wiki_docs:
    folder: "wiki_docs"
    filename: "wiki.csv"
    tables:
      wiki_docs_raw:
        partition_col: snapshot_date

bronze:
  path: "s3a://cs611-project/bronze"
  tables:
    legal_docs_raw:
      path: legal_docs_raw
      partition_col: snapshot_date
    wiki_docs_raw:
      path: wiki_docs_raw
      partition_col: snapshot_date

silver:
  path: "s3a://cs611-project/silver"
  tables:
    legal_docs_processed:
      path: legal_docs_processed
      partition_col: snapshot_date
    wiki_docs_processed:
      path: wiki_docs_processed
      partition_col: snapshot_date

gold:
  path: "s3a://cs611-project/gold"
  # Corpus-level tables (not split-dependent, not versioned by feature run)
  corpus:
    ngrams:
      path: ngrams
      partition_col: snapshot_date
    pos_tags:
      path: pos_tags
      partition_col: snapshot_date
    pos_tags_wiki:
      path: pos_tags_wiki
    embeddings:
      path: embeddings
      partition_col: snapshot_date
    embeddings_wiki:
      path: embeddings_wiki
      partition_col: snapshot_date
    label_store:
      path: label_store
      partition_col: snapshot_date
    # Split + raw label strings; reads existing label_store on R2 (no re-run needed).
    labels:
      path: label_store
      partition_col: snapshot_date
  # Flat paths from pre-migration runs (left on R2 for reference; superseded by runs/)
  legacy:
    ngram_count: ngram_count
    pos_counts: pos_counts
    pos_counts_wiki: pos_counts_wiki
    tfidf_features_train: tfidf_features_train
    tfidf_features_val_test_oot: tfidf_features_val_test_oot
    dcw_features_train: dcw_features_train
    dcw_features_val_test_oot: dcw_features_val_test_oot
  # Versioned feature / training matrices per pipeline run (run001, run002, ...)
  runs:
    base: runs
    default_run_id: run001
    default_gold_run_id: run001
    tfidf_train: tfidf_train
    tfidf_val_test_oot: tfidf_val_test_oot
    tfidf_svd_train: tfidf_svd_train
    tfidf_svd_val_test_oot: tfidf_svd_val_test_oot
    dcw_train: dcw_train
    dcw_val_test_oot: dcw_val_test_oot
    X_train: X_train
    X_val_test_oot: X_val_test_oot
    X_unlabelled: X_unlabelled
  model_predictions:
    base: model_predictions
    date_partition_prefix: prediction_date=
    default_exp_id: null

monitoring:
  path: "s3a://cs611-project/monitoring"

model_bank:
  path: "s3a://cs611-project/model_bank"
  features:
    base: features
    tfidf_pkl: tfidf.pkl
    tfidf_svd_pkl: tfidf_svd.pkl
    dcw_pkl: dcw.pkl
    tfidf_json_dir: tfidf
    dcw_score: dcw_score
    dcw_train_doc_ids: dcw_train_doc_ids
  experiments:
    base: experiments
    model_dir: model
    manifest_dir: manifest
    metrics_dir: metrics
    feature_importance_dir: feature_importance
    per_label_subdir: per_label
    default_model_name: random_forest
