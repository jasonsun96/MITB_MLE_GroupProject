# Maps legacy v1 paths to v2 layout (same bucket; no datamart/ prefix).
#
#   model_bank/features/{feature_run_id}/   — frozen TF-IDF + DCW artefacts
#   gold/runs/{gold_run_id}/                — tfidf/dcw tables and/or X_*
#   model_bank/experiments/{exp_id}/        — trained models + manifest + metrics
#   gold/model_predictions/prediction_date=YYYY-MM-DD/{exp_id}/
#
# feature_run_id: read tfidf_*/dcw_* + pickles from model_bank/features/{id}
# gold_run_id:    read/write X_train / X_val_test_oot under gold/runs/{id}

feature_runs:
  run001:
    description: Primary TF-IDF + DCW fit (shared upstream)
  run002:
    description: Feature slot (copy of run001 until refit)
  run003:
    description: Feature slot (copy of run001 until refit)
  run004:
    description: Feature slot (copy of run001 until refit)

gold_runs:
  run001:
    feature_run_id: run001
    has_tfidf: true
    has_dcw: true
    has_X: true
  run002:
    feature_run_id: run001
    has_tfidf: false
    has_dcw: false
    has_X: true
  run003:
    feature_run_id: run001
    has_tfidf: false
    has_dcw: false
    has_X: true
  run004:
    feature_run_id: run001
    has_tfidf: false
    has_dcw: false
    has_X: true

experiments:
  exp001_RF_emb_tfidf_dcw:
    feature_set: tfidf_dcw_embeddings
    model_type: random_forest
    feature_run_id: run001
    gold_run_id: run001
    grid_search: false
    legacy_run_id: run001_rf
    legacy_model_bank: model_bank/runs/run001/model
    legacy_predictions:
      - gold/model_predictions/prediction_20260612
      - gold/model_predictions/prediction_20260612_RF

  exp002_LR_emb_tfidf_dcw:
    feature_set: tfidf_dcw_embeddings
    model_type: logistic_regression
    feature_run_id: run001
    gold_run_id: run001
    grid_search: false
    legacy_run_id: run002_lr
    legacy_model_bank: model_bank/runs/run002_lr/model
    legacy_predictions:
      - gold/model_predictions/prediction_20260613_LR

  exp003_LR_tfidf_dcw:
    feature_set: tfidf_dcw
    model_type: logistic_regression
    feature_run_id: run001
    gold_run_id: run003
    grid_search: false
    legacy_run_id: run003_tfidf_dcw
    legacy_model_bank: model_bank/runs/run003_tfidf_dcw/model
    legacy_predictions:
      - gold/model_predictions/prediction_20260613_tfidf_dcw

  exp004_LR_tfidf_dcw_gs:
    feature_set: tfidf_dcw
    model_type: logistic_regression
    feature_run_id: run001
    gold_run_id: run004
    grid_search: true
    legacy_run_id: run004
    legacy_model_bank: model_bank/runs/run004/model
    legacy_predictions:
      - gold/model_predictions/prediction_20260615_run004_lr_tfidf_dcw

  exp005_RF_tfidf_dcw_gs:
    feature_set: tfidf_dcw
    model_type: random_forest
    feature_run_id: run001
    gold_run_id: run005
    grid_search: false
